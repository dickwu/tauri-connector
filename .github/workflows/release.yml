name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: ".exe"

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.cross"
        run: |
          cargo build --release -p connector-cli --target ${{ matrix.target }}
          cargo build --release -p connector-mcp-server --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: |
          cross build --release -p connector-cli --target ${{ matrix.target }}
          cross build --release -p connector-mcp-server --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/tauri-connector${{ matrix.suffix }}" \
             "dist/tauri-connector-${{ matrix.target }}${{ matrix.suffix }}"
          cp "target/${{ matrix.target }}/release/tauri-connector-mcp${{ matrix.suffix }}" \
             "dist/tauri-connector-mcp-${{ matrix.target }}${{ matrix.suffix }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            artifacts/*
