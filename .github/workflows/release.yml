name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: ".exe"

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.cross"
        run: |
          cargo build --release -p connector-cli --target ${{ matrix.target }}
          cargo build --release -p connector-mcp-server --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: |
          cross build --release -p connector-cli --target ${{ matrix.target }}
          cross build --release -p connector-mcp-server --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist

          # Raw binaries (for self-update)
          cp "target/${{ matrix.target }}/release/tauri-connector${{ matrix.suffix }}" \
             "dist/tauri-connector-${{ matrix.target }}${{ matrix.suffix }}"
          cp "target/${{ matrix.target }}/release/tauri-connector-mcp${{ matrix.suffix }}" \
             "dist/tauri-connector-mcp-${{ matrix.target }}${{ matrix.suffix }}"

          # Tarballs (for Homebrew)
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/tauri-connector${{ matrix.suffix }}" staging/
          cp "target/${{ matrix.target }}/release/tauri-connector-mcp${{ matrix.suffix }}" staging/
          tar -czf "dist/tauri-connector-${{ matrix.target }}.tar.gz" -C staging .
          rm -rf staging

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            artifacts/*

  homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets
        run: sleep 10

      - name: Download checksums
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release download "$TAG_NAME" \
            --repo dickwu/tauri-connector \
            --pattern SHA256SUMS.txt

      - name: Generate formula
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"

          sha_aarch64_darwin=$(grep 'tauri-connector-aarch64-apple-darwin.tar.gz' SHA256SUMS.txt | awk '{print $1}')
          sha_x86_64_darwin=$(grep 'tauri-connector-x86_64-apple-darwin.tar.gz' SHA256SUMS.txt | awk '{print $1}')
          sha_aarch64_linux=$(grep 'tauri-connector-aarch64-unknown-linux-gnu.tar.gz' SHA256SUMS.txt | awk '{print $1}')
          sha_x86_64_linux=$(grep 'tauri-connector-x86_64-unknown-linux-gnu.tar.gz' SHA256SUMS.txt | awk '{print $1}')

          cat > tauri-connector.rb << FORMULA
          class TauriConnector < Formula
            desc "CLI for deep inspection and interaction with Tauri v2 desktop apps"
            homepage "https://github.com/dickwu/tauri-connector"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/dickwu/tauri-connector/releases/download/v#{version}/tauri-connector-aarch64-apple-darwin.tar.gz"
                sha256 "${sha_aarch64_darwin}"
              end

              on_intel do
                url "https://github.com/dickwu/tauri-connector/releases/download/v#{version}/tauri-connector-x86_64-apple-darwin.tar.gz"
                sha256 "${sha_x86_64_darwin}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/dickwu/tauri-connector/releases/download/v#{version}/tauri-connector-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${sha_aarch64_linux}"
              end

              on_intel do
                url "https://github.com/dickwu/tauri-connector/releases/download/v#{version}/tauri-connector-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${sha_x86_64_linux}"
              end
            end

            def install
              bin.install "tauri-connector"
              bin.install "tauri-connector-mcp"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/tauri-connector --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' tauri-connector.rb

      - name: Push formula to homebrew-tap
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          gh api repos/dickwu/homebrew-tap/contents/Formula/tauri-connector.rb \
            --method PUT \
            --field message="tauri-connector ${VERSION}" \
            --field content="$(base64 -w0 tauri-connector.rb)" \
            --field sha="$(gh api repos/dickwu/homebrew-tap/contents/Formula/tauri-connector.rb --jq '.sha' 2>/dev/null || echo '')" \
            2>/dev/null || \
          gh api repos/dickwu/homebrew-tap/contents/Formula/tauri-connector.rb \
            --method PUT \
            --field message="tauri-connector ${VERSION}" \
            --field content="$(base64 -w0 tauri-connector.rb)"
